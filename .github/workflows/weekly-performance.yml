name: Weekly Performance Suite

on:
  schedule:
    - cron: '0 2 * * 6' # Todos los sábados a las 2:00 AM UTC
  workflow_dispatch:   # Habilita ejecución manual desde la UI de GitHub Actions

jobs:
  performance:
    name: Backend Performance Testing (K6)
    runs-on: ubuntu-latest

    env:
      API_URL: 'https://conduit-api.bondaracademy.com/api'
      TEST_USER_EMAIL: 'qa_test_user_antigravity@mailinator.com'
      TEST_USER_PASSWORD: 'QAtestpassword123!'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup K6 Performance Tool
        uses: grafana/setup-k6-action@v1

      - name: Run K6 Load Test
        run: k6 run -e API_URL=${{ env.API_URL }} -e TEST_USER_EMAIL=${{ env.TEST_USER_EMAIL }} -e TEST_USER_PASSWORD=${{ env.TEST_USER_PASSWORD }} k6/load-test.js

      - name: Run K6 Stress Test
        run: k6 run -e API_URL=${{ env.API_URL }} -e TEST_USER_EMAIL=${{ env.TEST_USER_EMAIL }} -e TEST_USER_PASSWORD=${{ env.TEST_USER_PASSWORD }} k6/stress-test.js

      - name: Run K6 Spike Test
        run: k6 run -e API_URL=${{ env.API_URL }} -e TEST_USER_EMAIL=${{ env.TEST_USER_EMAIL }} -e TEST_USER_PASSWORD=${{ env.TEST_USER_PASSWORD }} k6/spike-test.js

      - name: Upload K6 Reports and Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-reports
          path: |
            k6/**/*.json
            k6/**/*.html
            k6/**/*.log
          if-no-files-found: ignore
          retention-days: 30
