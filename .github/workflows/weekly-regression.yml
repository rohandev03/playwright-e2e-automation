name: Weekly Regression Suite

on:
  schedule:
    - cron: '0 0 * * 0' # Todos los domingos a la medianoche (12:00 AM UTC)
  workflow_dispatch:   # Habilita ejecución manual desde la UI de GitHub Actions

jobs:
  regression:
    name: Full Regression Suite
    runs-on: ubuntu-latest

    env:
      CI: 'true'
      BASE_URL: 'https://conduit.bondaracademy.com'
      API_URL: 'https://conduit-api.bondaracademy.com/api'
      TEST_USER_EMAIL: 'qa_test_user_antigravity@mailinator.com'
      TEST_USER_PASSWORD: 'QAtestpassword123!'
      TEST_USER_USERNAME: 'qa_test_user_antigravity'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers and System Dependencies
        run: npx playwright install --with-deps

      - name: Run Full Regression Suite (All Browsers)
        run: npm test

      - name: Upload Playwright Report HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
